<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background-color: hsl(47, 88%, 63%);
        min-height: 100vh;
        font-family: "Figtree", sans-serif;
        color: hsl(0, 0%, 7%);
      }
      main {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
      }
      .blog-card {
        width: 100%;
        max-width: 384px;
        padding: 24px;
        background-color: hsl(0, 0%, 100%);
        border: 1px solid hsl(0, 0%, 7%);
        border-radius: 20px;
        box-shadow: 8px 8px 0 hsl(0, 0%, 7%);
      }
      .blog-card__illustration {
        display: block;
        width: 100%;
        border-radius: 10px;
      }
      .blog-card__content {
        margin-top: 24px;
      }
      .category {
        display: inline-block;
        padding: 4px 12px;
        background-color: hsl(47, 88%, 63%);
        border-radius: 4px;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.5;
      }
      .published-date {
        margin: 12px 0 0;
        font-size: 14px;
        line-height: 1.5;
      }
      .blog-card__title {
        margin: 12px 0 0;
        font-size: 24px;
        font-weight: 800;
        line-height: 1.5;
      }
      .blog-card__title:hover {
        color: hsl(47, 88%, 63%);
        cursor: pointer;
      }
      .blog-card__description {
        margin: 12px 0 0;
        color: hsl(0, 0%, 42%);
        font-size: 16px;
        font-weight: 500;
        line-height: 1.5;
      }
      .author {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 24px;
      }

      .author__avatar {
        width: 32px;
        height: 32px;
      }

      .author__name {
        margin: 0;
        font-size: 14px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <article class="blog-card">
        <img
          class="blog-card__illustration"
          src="./assets/images/illustration-article.svg"
          alt="Abstract yellow, black and white illustration"
        />
        <div class="blog-card__content">
          <span class="category">Learning</span>
          <p class="published-date">
            Published <time datetime="2023-12-21">21 Dec 2023</time>
          </p>
          <h1 class="blog-card__title">HTML &amp; CSS foundations</h1>
          <p class="blog-card__description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
          <div class="author">
            <img
              class="author__avatar"
              src="./assets/images/image-avatar.webp"
              alt=""
            />
            <p class="author__name">Greg Hooper</p>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
